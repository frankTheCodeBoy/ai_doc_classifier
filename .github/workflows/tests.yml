name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        load: true
        tags: resume-classifier:test
    
    - name: Run tests in container
      run: |
        docker run --rm \
          -e BACKEND_API_KEY=changeme123 \
          -e HUGGINGFACE_API_KEY=test \
          -e ALLOWED_ORIGINS="*" \
          resume-classifier:test \
          bash -c "python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 > /dev/null 2>&1 &
          sleep 4
          pytest -v --tb=short tests/"
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: .pytest_cache/
