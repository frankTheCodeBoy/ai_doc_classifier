name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t resume-classifier:test .
    
    - name: Run tests
      run: docker run --rm resume-classifier:test pytest -v --tb=short
